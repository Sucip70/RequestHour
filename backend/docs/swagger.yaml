basePath: /
definitions:
  model.ErrorResponse:
    properties:
      error:
        example: failed to save session
        type: string
    type: object
  model.Session:
    properties:
      session:
        type: string
    type: object
  model.SessionExistsResponse:
    properties:
      exists:
        example: true
        type: boolean
      games:
        items:
          type: integer
        type: array
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API backed by Supabase (PostgreSQL).
  title: Request Hour API
  version: "1.0"
paths:
  /session:
    post:
      description: Generates a random token and stores it in tr_session.session.
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Session'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Create session
      tags:
      - session
  /session/{session}:
    get:
      description: Returns whether the session exists and the tr_session.games integer
        array (empty when missing).
      parameters:
      - description: Session token (hex)
        in: path
        name: session
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.SessionExistsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Check session exists
      tags:
      - session
schemes:
- http
swagger: "2.0"
